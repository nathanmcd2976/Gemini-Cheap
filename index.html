<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nathan's Jam · Ultimate</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0c;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .app {
      display: flex;
      max-width: 1200px;
      width: 100%;
      height: 95vh;
      gap: 12px;
    }
    .sidebar {
      width: 280px;
      background: #1a1a2e;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid #3a3a5e;
      transition: width 0.2s;
    }
    .sidebar.collapsed {
      width: 50px;
    }
    .sidebar.collapsed .sidebar-header span,
    .sidebar.collapsed .sidebar-actions,
    .sidebar.collapsed .thread-list,
    .sidebar.collapsed .new-thread-btn,
    .sidebar.collapsed .toggle-section {
      display: none;
    }
    .sidebar.collapsed .sidebar-header {
      justify-content: center;
    }
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #3a3a5e;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-header span {
      color: #ccc;
      font-size: 14px;
    }
    .toggle-btn {
      background: none;
      border: none;
      color: #aaa;
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
    }
    .sidebar-actions {
      padding: 8px;
      display: flex;
      gap: 8px;
    }
    .import-btn, .export-btn {
      flex: 1;
      padding: 8px;
      background: #2a2a4e;
      border: 1px solid #3a3a5e;
      border-radius: 8px;
      color: #ccc;
      font-size: 12px;
      cursor: pointer;
    }
    .export-btn {
      background: #fbbc04;
      color: #000;
      border-color: #fbbc04;
    }
    .thread-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .thread-item {
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 4px;
      cursor: pointer;
      background: #2a2a4e;
      border: 1px solid #3a3a5e;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .thread-item.active {
      background: #34a853;
    }
    .thread-item.pinned {
      border-left: 3px solid #fbbc04;
    }
    .thread-info {
      flex: 1;
      overflow: hidden;
    }
    .thread-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 13px;
    }
    .thread-meta {
      font-size: 10px;
      color: #aaa;
      margin-top: 2px;
    }
    .thread-actions {
      display: flex;
      gap: 4px;
    }
    .thread-actions button {
      background: none;
      border: none;
      color: #aaa;
      cursor: pointer;
      font-size: 12px;
      padding: 2px 4px;
      height: auto;
      min-width: auto;
    }
    .thread-actions button:hover {
      color: white;
    }
    .new-thread-btn {
      margin: 8px;
      padding: 10px;
      background: #34a853;
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    .toggle-section {
      padding: 8px;
      border-top: 1px solid #3a3a5e;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 4px;
    }
    .toggle-label {
      color: #ccc;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .toggle-switch {
      width: 40px;
      height: 20px;
      background: #555;
      border-radius: 20px;
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
    }
    .toggle-switch.active {
      background: #34a853;
    }
    .toggle-switch::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      background: white;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: left 0.2s;
    }
    .toggle-switch.active::after {
      left: 22px;
    }
    .main {
      flex: 1;
      background: #1a1a2e;
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid #3a3a5e;
    }
    .header {
      padding: 20px;
      border-bottom: 1px solid #3a3a5e;
      background: #1e1e3a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    h1 {
      font-size: 24px;
      background: linear-gradient(135deg, #34a853, #8ab4f8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header-toggles {
      display: flex;
      gap: 16px;
    }
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .message {
      display: flex;
      gap: 12px;
      max-width: 85%;
    }
    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #2a2a4e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .message.user .avatar { background: #34a853; }
    .bubble {
      background: #2a2a4e;
      padding: 12px 16px;
      border-radius: 18px;
      color: #eee;
      line-height: 1.5;
    }
    .message.user .bubble { background: #34a853; color: white; }
    .file-attachment {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      font-size: 12px;
    }
    .citation {
      margin-top: 8px;
      font-size: 11px;
      color: #8ab4f8;
    }
    .citation a {
      color: #8ab4f8;
    }
    .input-area {
      padding: 20px;
      border-top: 1px solid #3a3a5e;
      background: #1e1e3a;
    }
    .file-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    .file-tag {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: #2a2a4e;
      border-radius: 20px;
      font-size: 12px;
      color: #ccc;
    }
    .file-tag button {
      background: none;
      border: none;
      color: #ff8a80;
      cursor: pointer;
      font-size: 16px;
      padding: 0 4px;
    }
    .input-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    .input-wrapper {
      flex: 1;
      position: relative;
    }
    textarea {
      width: 100%;
      padding: 14px 50px 14px 18px;
      background: #0f0f1a;
      border: 1px solid #3a3a5e;
      border-radius: 24px;
      color: white;
      font-size: 15px;
      resize: none;
      min-height: 55px;
      max-height: 150px;
      font-family: inherit;
    }
    textarea:focus { outline: none; border-color: #34a853; }
    .attach-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #aaa;
      font-size: 20px;
      cursor: pointer;
      padding: 6px;
    }
    .attach-btn:hover { color: #34a853; }
    button {
      padding: 14px 28px;
      background: #34a853;
      border: none;
      border-radius: 24px;
      color: white;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      height: 55px;
    }
    button:disabled { opacity: 0.5; }
    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state {
      text-align: center;
      color: #666;
      padding: 40px;
    }
    #fileInput, #importInput { display: none; }
  </style>
</head>
<body>
<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span>📁 Threads</span>
      <button class="toggle-btn" id="toggleSidebar">◀</button>
    </div>
    <div class="sidebar-actions">
      <button class="import-btn" id="importBtn">📥 Import</button>
      <button class="export-btn" id="exportBtn">📤 Export</button>
    </div>
    <div class="thread-list" id="threadList"></div>
    <button class="new-thread-btn" id="newThreadBtn">✨ New Thread</button>
    <!-- NEW: Toggle section in sidebar -->
    <div class="toggle-section">
      <div class="toggle-row">
        <span class="toggle-label">🧠 Thinking</span>
        <div class="toggle-switch" id="thinkingToggle"></div>
      </div>
      <div class="toggle-row">
        <span class="toggle-label">🔍 Search Grounding</span>
        <div class="toggle-switch active" id="searchToggle"></div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="header">
      <h1>🍌 Nathan's Jam · Ultimate</h1>
      <div class="header-toggles">
        <!-- Toggles also visible in header for quick access -->
      </div>
    </div>
    <div class="chat-area" id="chatArea">
      <div class="empty-state">Select or create a thread</div>
    </div>
    <div class="input-area">
      <div class="file-preview" id="filePreview"></div>
      <div class="input-row">
        <div class="input-wrapper">
          <textarea id="messageInput" placeholder="Type a message or attach files..." rows="1"></textarea>
          <button class="attach-btn" id="attachBtn">📎</button>
        </div>
        <button id="sendBtn">Send</button>
      </div>
    </div>
    <input type="file" id="fileInput" accept="image/*,audio/*,.pdf,.txt,.md,text/plain,application/pdf" multiple>
    <input type="file" id="importInput" accept=".md,text/markdown,text/plain">
  </div>
</div>

<script>
  const API_KEY = 'AIzaSyBRNn63JuMDMVgnyoYTNheBTB6g9yZ0VyU';
  const MODEL = 'gemini-2.5-flash-lite';
  const STORAGE_KEY = 'nathans-jam-ultimate';

  // State
  let threads = [];
  let activeThreadId = null;
  let pendingFiles = [];
  let isLoading = false;
  
  // NEW: Toggle states
  let thinkingEnabled = false;
  let searchEnabled = true;

  const sidebar = document.getElementById('sidebar');
  const toggleSidebar = document.getElementById('toggleSidebar');
  const threadList = document.getElementById('threadList');
  const newThreadBtn = document.getElementById('newThreadBtn');
  const importBtn = document.getElementById('importBtn');
  const exportBtn = document.getElementById('exportBtn');
  const importInput = document.getElementById('importInput');
  const chatArea = document.getElementById('chatArea');
  const messageInput = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendBtn');
  const attachBtn = document.getElementById('attachBtn');
  const fileInput = document.getElementById('fileInput');
  const filePreview = document.getElementById('filePreview');
  
  // NEW: Toggle elements
  const thinkingToggle = document.getElementById('thinkingToggle');
  const searchToggle = document.getElementById('searchToggle');

  // ========== TOGGLE HANDLERS ==========
  thinkingToggle.addEventListener('click', () => {
    thinkingEnabled = !thinkingEnabled;
    thinkingToggle.classList.toggle('active', thinkingEnabled);
  });

  searchToggle.addEventListener('click', () => {
    searchEnabled = !searchEnabled;
    searchToggle.classList.toggle('active', searchEnabled);
  });

  // ========== THREAD MANAGEMENT (with Pin/Rename/Delete) ==========
  function loadThreads() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      threads = JSON.parse(saved);
    } else {
      threads = [{
        id: 'default-' + Date.now(),
        title: 'General Chat',
        messages: [],
        updatedAt: Date.now(),
        pinned: false
      }];
    }
    saveThreads();
  }

  function saveThreads() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(threads));
  }

  function createThread(title = 'New Chat', messages = []) {
    const thread = {
      id: Date.now() + '-' + Math.random().toString(36),
      title,
      messages,
      updatedAt: Date.now(),
      pinned: false
    };
    threads.push(thread);
    saveThreads();
    return thread;
  }

  function deleteThread(threadId) {
    threads = threads.filter(t => t.id !== threadId);
    if (activeThreadId === threadId) {
      activeThreadId = threads.length > 0 ? threads[0].id : null;
    }
    saveThreads();
    renderSidebar();
    renderActiveThread();
  }

  function renameThread(threadId, newTitle) {
    const thread = threads.find(t => t.id === threadId);
    if (thread) {
      thread.title = newTitle;
      thread.updatedAt = Date.now();
      saveThreads();
      renderSidebar();
    }
  }

  function togglePinThread(threadId) {
    const thread = threads.find(t => t.id === threadId);
    if (thread) {
      thread.pinned = !thread.pinned;
      saveThreads();
      renderSidebar();
    }
  }

  function renderSidebar() {
    threadList.innerHTML = '';
    // Sort: pinned first, then by updatedAt
    const sorted = [...threads].sort((a, b) => {
      if (a.pinned && !b.pinned) return -1;
      if (!a.pinned && b.pinned) return 1;
      return b.updatedAt - a.updatedAt;
    });
    
    sorted.forEach(thread => {
      const div = document.createElement('div');
      div.className = `thread-item ${thread.id === activeThreadId ? 'active' : ''} ${thread.pinned ? 'pinned' : ''}`;
      div.innerHTML = `
        <div class="thread-info">
          <div class="thread-title">${thread.pinned ? '📌 ' : ''}${escapeHtml(thread.title)}</div>
          <div class="thread-meta">${formatTime(thread.updatedAt)} · ${thread.messages.length} msgs</div>
        </div>
        <div class="thread-actions">
          <button class="pin-btn" data-id="${thread.id}" title="${thread.pinned ? 'Unpin' : 'Pin'}">📌</button>
          <button class="rename-btn" data-id="${thread.id}" title="Rename">✏️</button>
          <button class="delete-btn" data-id="${thread.id}" title="Delete">🗑️</button>
        </div>
      `;
      
      // Thread selection
      div.querySelector('.thread-info').addEventListener('click', () => switchThread(thread.id));
      
      // Pin button
      div.querySelector('.pin-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        togglePinThread(thread.id);
      });
      
      // Rename button
      div.querySelector('.rename-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        const newTitle = prompt('Enter new thread name:', thread.title);
        if (newTitle && newTitle.trim()) {
          renameThread(thread.id, newTitle.trim());
        }
      });
      
      // Delete button
      div.querySelector('.delete-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        if (confirm(`Delete thread "${thread.title}"?`)) {
          deleteThread(thread.id);
        }
      });
      
      threadList.appendChild(div);
    });
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function formatTime(timestamp) {
    const date = new Date(timestamp);
    const now = new Date();
    const diff = now - date;
    if (diff < 60000) return 'Just now';
    if (diff < 3600000) return `${Math.floor(diff/60000)}m ago`;
    if (diff < 86400000) return `${Math.floor(diff/3600000)}h ago`;
    return date.toLocaleDateString();
  }

  function switchThread(threadId) {
    activeThreadId = threadId;
    renderSidebar();
    renderActiveThread();
    pendingFiles = [];
    updateFilePreview();
  }

  function getActiveThread() {
    return threads.find(t => t.id === activeThreadId);
  }

  function renderActiveThread() {
    const thread = getActiveThread();
    if (!thread) {
      chatArea.innerHTML = '<div class="empty-state">Select or create a thread</div>';
      return;
    }
    chatArea.innerHTML = '';
    if (thread.messages.length === 0) {
      chatArea.innerHTML = '<div class="empty-state">Send a message to start</div>';
      return;
    }
    thread.messages.forEach(msg => {
      const role = msg.role === 'user' ? 'user' : 'assistant';
      const text = msg.parts.find(p => p.text)?.text || '';
      const files = msg.parts.filter(p => p.inlineData).map(p => ({ name: 'File', type: p.inlineData.mimeType }));
      renderMessage(role, text, files, msg.citations);
    });
  }

  function renderMessage(role, text, files = [], citations = null) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    const bubbleContent = text ? text.replace(/\n/g, '<br>') : (files.length ? '(attached files)' : '');
    let bubbleHtml = `<div class="bubble">${bubbleContent}`;
    files.forEach(f => {
      bubbleHtml += `<div class="file-attachment">📎 ${f.name || 'File'} (${f.type || 'unknown'})</div>`;
    });
    if (citations && citations.length) {
      bubbleHtml += `<div class="citation">🔍 Sources: ` + citations.map(c => 
        `<a href="${c.uri}" target="_blank">${c.title || 'link'}</a>`
      ).join(', ') + `</div>`;
    }
    bubbleHtml += '</div>';
    div.innerHTML = `<div class="avatar">${role === 'user' ? '👤' : '🍌'}</div>${bubbleHtml}`;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  // ========== MARKDOWN IMPORT/EXPORT ==========
  function parseMarkdownToMessages(mdText) {
    const messages = [];
    const lines = mdText.split('\n');
    let currentRole = null, currentContent = [];
    for (const line of lines) {
      if (line.match(/^\*\*👤 You\*\*/) || line.match(/^You:/i)) {
        if (currentRole) messages.push({ role: currentRole, parts: [{ text: currentContent.join('\n').trim() }] });
        currentRole = 'user';
        const content = line.replace(/^\*\*👤 You\*\*:?\s*/, '').replace(/^You:\s*/i, '');
        currentContent = content ? [content] : [];
      } else if (line.match(/^\*\*🍌.*\*\*/) || line.match(/^Assistant:/i) || line.match(/^🍌/)) {
        if (currentRole) messages.push({ role: currentRole, parts: [{ text: currentContent.join('\n').trim() }] });
        currentRole = 'assistant';
        const content = line.replace(/^\*\*🍌[^*]*\*\*:?\s*/, '').replace(/^Assistant:\s*/i, '').replace(/^🍌:?\s*/, '');
        currentContent = content ? [content] : [];
      } else if (currentRole !== null && line.trim() && !line.match(/^---/) && !line.match(/^#/)) {
        currentContent.push(line);
      }
    }
    if (currentRole && currentContent.length) messages.push({ role: currentRole, parts: [{ text: currentContent.join('\n').trim() }] });
    return messages;
  }

  async function importMarkdown(file) {
    const text = await file.text();
    const messages = parseMarkdownToMessages(text);
    if (messages.length === 0) { alert('No valid messages found.'); return; }
    const thread = createThread(file.name.replace(/\.md$/, ''), messages);
    activeThreadId = thread.id;
    renderSidebar();
    renderActiveThread();
  }

  function exportActiveThread() {
    const thread = getActiveThread();
    if (!thread || thread.messages.length === 0) { alert('No messages to export.'); return; }
    let md = `# ${thread.title}\n\n**Exported:** ${new Date().toLocaleString()}\n**Model:** ${MODEL}\n\n---\n\n`;
    thread.messages.forEach((msg, i) => {
      const role = msg.role === 'user' ? '**👤 You**' : '**🍌 Nathan\'s Jam**';
      md += `${role}\n\n`;
      const text = msg.parts.find(p => p.text)?.text || '';
      if (text) md += text + '\n\n';
      if (i < thread.messages.length - 1) md += '---\n\n';
    });
    const blob = new Blob([md], { type: 'text/markdown' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${thread.title.replace(/[^a-z0-9]/gi, '_')}.md`;
    a.click();
    URL.revokeObjectURL(a.href);
  }

  // ========== FILE HANDLING ==========
  function updateFilePreview() {
    filePreview.innerHTML = '';
    pendingFiles.forEach((f, i) => {
      const tag = document.createElement('div');
      tag.className = 'file-tag';
      tag.innerHTML = `📎 ${f.name} (${(f.size / 1024).toFixed(1)} KB) <button data-index="${i}">×</button>`;
      tag.querySelector('button').addEventListener('click', () => {
        pendingFiles.splice(i, 1);
        updateFilePreview();
      });
      filePreview.appendChild(tag);
    });
  }

  async function processFiles(files) {
    const processed = [];
    for (const f of files) {
      const b64 = await new Promise(r => {
        const reader = new FileReader();
        reader.onload = e => r(e.target.result.split(',')[1]);
        reader.readAsDataURL(f.file);
      });
      processed.push({ name: f.name, type: f.type, data: b64, size: f.size });
    }
    return processed;
  }

  // ========== CHAT (with Thinking & Search toggles) ==========
  function clearEmptyState() {
    const empty = chatArea.querySelector('.empty-state');
    if (empty) empty.remove();
  }

  function addLoading() {
    const div = document.createElement('div');
    div.className = 'message assistant';
    div.id = 'loadingIndicator';
    div.innerHTML = `<div class="avatar">🍌</div><div class="bubble">Thinking<span class="loading"></span></div>`;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function removeLoading() {
    document.getElementById('loadingIndicator')?.remove();
  }

  async function sendMessage() {
    const text = messageInput.value.trim();
    const hasFiles = pendingFiles.length > 0;
    if (!text && !hasFiles) return;
    if (isLoading) return;
    
    let thread = getActiveThread();
    if (!thread) {
      thread = createThread();
      activeThreadId = thread.id;
      renderSidebar();
    }
    
    clearEmptyState();
    
    const parts = [];
    if (text) parts.push({ text });
    
    let displayFiles = [];
    if (hasFiles) {
      const processed = await processFiles(pendingFiles);
      processed.forEach(f => {
        parts.push({ inlineData: { mimeType: f.type, data: f.data } });
        displayFiles.push({ name: f.name, type: f.type });
      });
    }
    
    renderMessage('user', text || '', displayFiles);
    thread.messages.push({ role: 'user', parts });
    thread.updatedAt = Date.now();
    if (thread.title === 'New Chat') thread.title = text.slice(0, 30) || 'File upload';
    saveThreads();
    
    messageInput.value = '';
    messageInput.style.height = 'auto';
    pendingFiles = [];
    updateFilePreview();
    
    isLoading = true;
    sendBtn.disabled = true;
    addLoading();
    
    try {
      // Build payload with toggles
      const tools = [];
      if (searchEnabled) {
        tools.push({ googleSearch: {} });
      }
      
      const payload = {
        contents: thread.messages,
        generationConfig: {
          temperature: 1.0,
          maxOutputTokens: 4096,
          thinkingConfig: { thinkingBudget: thinkingEnabled ? 2048 : 0 }
        }
      };
      
      if (tools.length > 0) {
        payload.tools = tools;
      }
      
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        }
      );
      
      removeLoading();
      
      if (!res.ok) throw new Error(`API ${res.status}`);
      
      const data = await res.json();
      const candidate = data.candidates?.[0];
      if (!candidate?.content?.parts) throw new Error('No response');
      
      let replyText = '';
      const replyParts = [];
      for (const part of candidate.content.parts) {
        if (part.text) {
          replyText += part.text;
          replyParts.push({ text: part.text });
        } else if (part.inlineData) {
          replyParts.push({ inlineData: part.inlineData });
        }
      }
      if (!replyText && replyParts.length === 0) replyText = '(No response)';
      
      // Extract citations if search grounding was used
      let citations = [];
      if (candidate.groundingMetadata?.groundingChunks) {
        citations = candidate.groundingMetadata.groundingChunks.map(chunk => ({
          uri: chunk.web?.uri,
          title: chunk.web?.title || 'source'
        })).filter(c => c.uri);
      }
      
      renderMessage('assistant', replyText, [], citations);
      
      thread.messages.push({
        role: 'model',
        parts: replyParts,
        citations: citations
      });
      thread.updatedAt = Date.now();
      saveThreads();
      renderSidebar();
      
    } catch (err) {
      removeLoading();
      renderMessage('assistant', `Error: ${err.message}`);
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
    }
  }

  // ========== EVENT LISTENERS ==========
  toggleSidebar.addEventListener('click', () => {
    sidebar.classList.toggle('collapsed');
    toggleSidebar.textContent = sidebar.classList.contains('collapsed') ? '▶' : '◀';
  });
  
  newThreadBtn.addEventListener('click', () => {
    const thread = createThread();
    activeThreadId = thread.id;
    renderSidebar();
    renderActiveThread();
  });
  
  importBtn.addEventListener('click', () => importInput.click());
  exportBtn.addEventListener('click', exportActiveThread);
  
  importInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) { importMarkdown(file); importInput.value = ''; }
  });
  
  sendBtn.addEventListener('click', sendMessage);
  attachBtn.addEventListener('click', () => fileInput.click());
  
  fileInput.addEventListener('change', () => {
    Array.from(fileInput.files).forEach(f => pendingFiles.push({ file: f, name: f.name, type: f.type, size: f.size }));
    updateFilePreview();
    fileInput.value = '';
  });
  
  messageInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  
  messageInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 150) + 'px';
  });
  
  chatArea.addEventListener('dragover', e => e.preventDefault());
  chatArea.addEventListener('drop', e => {
    e.preventDefault();
    Array.from(e.dataTransfer.files).forEach(f => pendingFiles.push({ file: f, name: f.name, type: f.type, size: f.size }));
    updateFilePreview();
  });

  // INIT
  loadThreads();
  if (threads.length > 0) activeThreadId = threads[0].id;
  renderSidebar();
  renderActiveThread();
</script>
</body>
</html>
