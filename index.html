<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nathan's Grok · Fast ↔ Think</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0c;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .container {
      max-width: 800px;
      width: 100%;
      height: 95vh;
      background: #1a1a2e;
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      border: 1px solid #3a3a5e;
    }
    .header {
      padding: 20px 24px;
      border-bottom: 1px solid #3a3a5e;
      background: #1e1e3a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    h1 {
      font-size: 24px;
      background: linear-gradient(135deg, #fff, #aaa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .model-toggle {
      display: flex;
      background: #0f0f1a;
      border-radius: 30px;
      padding: 4px;
      border: 1px solid #3a3a5e;
    }
    .toggle-option {
      padding: 8px 20px;
      border-radius: 26px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      color: #aaa;
    }
    .toggle-option.active {
      background: #1a1a2e;
      color: white;
    }
    .toggle-option.fast.active {
      background: #34a853;
    }
    .toggle-option.think.active {
      background: #4285f4;
    }
    .badge {
      font-size: 11px;
      margin-left: 6px;
      opacity: 0.8;
    }
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .message {
      display: flex;
      gap: 14px;
      max-width: 90%;
    }
    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .message.assistant {
      align-self: flex-start;
    }
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      background: #2a2a4e;
      flex-shrink: 0;
    }
    .message.user .avatar {
      background: #34a853;
    }
    .message.assistant.fast .avatar {
      background: #34a853;
    }
    .message.assistant.think .avatar {
      background: #4285f4;
    }
    .bubble {
      background: #2a2a4e;
      padding: 14px 18px;
      border-radius: 20px;
      color: #eee;
      line-height: 1.6;
      word-break: break-word;
    }
    .message.user .bubble {
      background: #34a853;
      color: white;
    }
    .bubble pre {
      background: #0f0f1a;
      padding: 12px;
      border-radius: 10px;
      overflow-x: auto;
      margin: 10px 0;
    }
    .bubble code {
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 13px;
    }
    .model-tag {
      display: inline-block;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 12px;
      margin-left: 8px;
      font-weight: 600;
    }
    .message.assistant.fast .model-tag {
      background: rgba(52, 168, 83, 0.2);
      color: #34a853;
    }
    .message.assistant.think .model-tag {
      background: rgba(66, 133, 244, 0.2);
      color: #4285f4;
    }
    .input-area {
      padding: 20px 24px;
      border-top: 1px solid #3a3a5e;
      background: #1e1e3a;
    }
    .input-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    .input-wrapper {
      flex: 1;
    }
    textarea {
      width: 100%;
      padding: 16px 18px;
      background: #0f0f1a;
      border: 1px solid #3a3a5e;
      border-radius: 24px;
      color: white;
      font-size: 15px;
      resize: none;
      min-height: 60px;
      max-height: 150px;
      font-family: inherit;
      line-height: 1.4;
    }
    textarea:focus {
      outline: none;
      border-color: #aaa;
    }
    .send-btn {
      padding: 16px 28px;
      background: #fff;
      border: none;
      border-radius: 24px;
      color: #000;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      height: 60px;
      transition: all 0.2s;
    }
    .send-btn:hover:not(:disabled) {
      background: #ddd;
    }
    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .loading {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state {
      text-align: center;
      color: #666;
      padding: 40px;
    }
    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    .clear-btn {
      background: none;
      border: 1px solid #3a3a5e;
      color: #aaa;
      padding: 8px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
    }
    .clear-btn:hover {
      background: #2a2a4e;
      color: white;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div style="display: flex; align-items: center; gap: 16px;">
      <h1>
        <span>⚡</span> Nathan's Grok
      </h1>
      <div class="model-toggle">
        <div class="toggle-option fast active" data-model="fast">Fast</div>
        <div class="toggle-option think" data-model="think">Think</div>
      </div>
    </div>
    <button class="clear-btn" id="clearBtn">Clear Chat</button>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="empty-state">
      <div class="empty-icon">⚡</div>
      <p><strong>Nathan's Grok is ready</strong></p>
      <p style="font-size:14px; margin-top:8px;">Fast mode · Think mode · Switch anytime</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <div class="input-wrapper">
        <textarea id="messageInput" placeholder="Message Grok..." rows="1"></textarea>
      </div>
      <button class="send-btn" id="sendBtn">Send</button>
    </div>
  </div>
</div>

<script>
// Nathan's xAI API Key
const API_KEY = 'xai-xCLWNxVxlm6ak0a3aOINr0YbEJpKkC3tMQdybt54D4vJGiAqGRdxosgwKheyiNXBKKi703grUIXgk7Hf';
const API_BASE = 'https://api.x.ai/v1';

// Model mapping
const MODELS = {
  fast: 'grok-4-1-fast-non-reasoning',
  think: 'grok-4-1-fast-reasoning'
};

// State
let messages = [];
let currentModel = 'fast';  // 'fast' or 'think'
let isLoading = false;

// DOM Elements
const chatArea = document.getElementById('chatArea');
const messageInput = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');
const clearBtn = document.getElementById('clearBtn');
const toggleOptions = document.querySelectorAll('.toggle-option');

// ========== MODEL TOGGLE ==========
toggleOptions.forEach(option => {
  option.addEventListener('click', () => {
    toggleOptions.forEach(opt => opt.classList.remove('active'));
    option.classList.add('active');
    currentModel = option.dataset.model;
  });
});

// ========== CHAT FUNCTIONS ==========
function clearEmptyState() {
  const empty = chatArea.querySelector('.empty-state');
  if (empty) empty.remove();
}

function addMessage(role, content, modelUsed = null) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  if (role === 'assistant' && modelUsed) {
    div.classList.add(modelUsed);
  }
  
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? '👤' : '⚡';
  
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  
  let formatted = content
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>');
  
  if (role === 'assistant' && modelUsed) {
    const modelName = modelUsed === 'fast' ? 'Fast' : 'Think';
    formatted = `<span class="model-tag">${modelName}</span> ` + formatted;
  }
  
  bubble.innerHTML = formatted;
  
  div.appendChild(avatar);
  div.appendChild(bubble);
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function addLoadingIndicator() {
  const div = document.createElement('div');
  div.className = `message assistant ${currentModel}`;
  div.id = 'loadingIndicator';
  
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = '⚡';
  
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  const modelName = currentModel === 'fast' ? 'Fast' : 'Think';
  bubble.innerHTML = `<span class="model-tag">${modelName}</span> Thinking...`;
  
  div.appendChild(avatar);
  div.appendChild(bubble);
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function removeLoadingIndicator() {
  const loading = document.getElementById('loadingIndicator');
  if (loading) loading.remove();
}

// ========== API CALL ==========
async function sendMessage() {
  const text = messageInput.value.trim();
  if (!text) return;
  if (isLoading) return;
  
  clearEmptyState();
  addMessage('user', text);
  messages.push({ role: 'user', content: text });
  
  messageInput.value = '';
  messageInput.style.height = 'auto';
  
  isLoading = true;
  sendBtn.disabled = true;
  addLoadingIndicator();
  
  try {
    const modelName = MODELS[currentModel];
    
    const response = await fetch(`${API_BASE}/chat/completions`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${API_KEY}`
      },
      body: JSON.stringify({
        model: modelName,
        messages: messages,
        stream: false,
        temperature: 0.7
      })
    });
    
    removeLoadingIndicator();
    
    if (!response.ok) {
      const error = await response.text();
      throw new Error(`API ${response.status}: ${error.slice(0, 100)}`);
    }
    
    const data = await response.json();
    const reply = data.choices?.[0]?.message?.content || '(No response)';
    
    addMessage('assistant', reply, currentModel);
    messages.push({ role: 'assistant', content: reply });
    
  } catch (err) {
    removeLoadingIndicator();
    addMessage('assistant', `Error: ${err.message}`, currentModel);
  } finally {
    isLoading = false;
    sendBtn.disabled = false;
  }
}

function clearChat() {
  if (confirm('Clear this conversation?')) {
    messages = [];
    chatArea.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚡</div>
        <p><strong>Nathan's Grok is ready</strong></p>
        <p style="font-size:14px; margin-top:8px;">Fast mode · Think mode · Switch anytime</p>
      </div>
    `;
  }
}

// ========== EVENT LISTENERS ==========
sendBtn.addEventListener('click', sendMessage);
clearBtn.addEventListener('click', clearChat);

messageInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

messageInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 150) + 'px';
});
</script>
</body>
</html>
